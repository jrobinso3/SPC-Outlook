<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Severe Weather Outlook Dashboard</title>
    <meta name="description" content="Real-time US Severe Weather Outlook visualization using official SPC data and Tailwind v4.">
    
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-outfit: "Outfit", sans-serif;
            --color-spc-tstm: #c1e9aa;
            --color-spc-mrgl: #008b00;
            --color-spc-slgt: #ffff00;
            --color-spc-enh: #ffa500;
            --color-spc-mdt: #ff0000;
            --color-spc-high: #ff00ff;
            --color-panel-bg: rgba(20, 24, 33, 0.85);
        }

        body {
            font-family: var(--font-outfit);
            background-color: #0b0e14;
            color: #f1f5f9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .glass-panel {
            background-color: var(--color-panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            z-index: 5000;
        }

        /* Discussion Side Panel */
        #side-panel {
            top: 62px;
            right: -100%;
            width: 100%;
            height: calc(100% - 62px);
            z-index: 2000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            #side-panel {
                top: 96px;
                right: -400px;
                width: 420px;
                height: calc(100% - 112px);
                border-top-left-radius: 1rem;
                border-bottom-left-radius: 1rem;
            }
        }

        #side-panel.active {
            right: 0;
        }

        #discussion-body pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: var(--font-outfit);
            font-size: 14px;
            line-height: 1.625;
            color: #e2e8f0;
            letter-spacing: 0.025em;
        }

        @media (min-width: 640px) {
            #discussion-body pre {
                font-size: 15px;
            }
        }

        #legend-container.active {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        /* Toggle Switches */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 2rem;
            height: 18px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            border-radius: 9999px;
        }

        .slider:before {
            position: absolute;
            content: '';
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: all 0.3s;
            border-radius: 9999px;
        }

        input:checked + .slider {
            background-color: #3b82f6;
        }

        input:checked + .slider:before {
            transform: translateX(14px);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 0.25rem;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .radar-product-btn {
            color: #64748b;
            transition: all 0.3s;
            cursor: pointer;
        }

        .radar-product-btn:hover {
            color: white;
        }

        .radar-product-btn.active {
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.1);
        }

        #layer-menu.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
        }

        /* Map and UI layout */
        #map {
            height: 100vh;
            width: 100vw;
            background: #0b0e14;
        }

        .leaflet-container {
            background: #0b0e14 !important;
            font-family: var(--font-outfit) !important;
        }

        /* Legend Gradient Styles */
        .legend-gradient {
            background: linear-gradient(to right, 
                var(--color-spc-tstm), 
                var(--color-spc-mrgl), 
                var(--color-spc-slgt), 
                var(--color-spc-enh), 
                var(--color-spc-mdt), 
                var(--color-spc-high)
            );
        }

        /* Custom Popup Styles */
        .leaflet-popup-content-wrapper {
            background: rgba(20, 24, 33, 0.95) !important;
            backdrop-filter: blur(12px);
            color: white !important;
            border-radius: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .leaflet-popup-tip {
            background: rgba(20, 24, 33, 0.95) !important;
        }

        .confirmed-tor {
            animation: tor-pulse 1.2s infinite ease-in-out;
            stroke-dasharray: 10, 5;
        }

        @keyframes tor-pulse {
            0% { stroke-width: 3; opacity: 1; }
            50% { stroke-width: 6; opacity: 0.7; }
            100% { stroke-width: 3; opacity: 1; }
        }

        /* Radar Site Label Styling */
        .radar-site-label {
            background: transparent;
            border: none;
        }

        .radar-site-label span {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.4);
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .radar-site-label.active-radar span {
            color: white;
            background-color: rgba(59, 130, 246, 0.8);
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        .radar-site-label span:hover {
            color: white;
            background-color: rgba(59, 130, 246, 0.8);
            border-color: #60a5fa;
        }
    </style>
</head>
<body class="bg-[#0b0e14]">
    <header class="fixed top-0 left-0 right-0 h-16 sm:h-20 bg-[#0b0e14]/90 backdrop-blur-md border-b border-white/5 z-[5000]">
        <div class="max-w-7xl mx-auto h-full px-4 sm:px-8 flex justify-between items-center">
            <h1 class="text-lg sm:text-2xl font-semibold tracking-tight">Severe Weather <span class="text-blue-500">Outlook</span></h1>
            
            <div id="alert-status" class="hidden sm:flex items-center gap-6 text-[10px] sm:text-xs uppercase tracking-widest px-6 border-x border-white/5 h-full">
                <!-- Populated via JS -->
            </div>

            <!-- Custom Layer Menu -->
            <div class="relative">
                <button id="active-day-label" class="bg-blue-500/15 hover:bg-blue-500/25 text-blue-500 px-4 py-2 rounded-full text-xs sm:text-sm font-semibold border border-blue-500/30 whitespace-nowrap transition-all flex items-center gap-2 cursor-pointer outline-none">
                    <span>Map Layers</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div id="layer-menu" class="glass-panel absolute right-0 top-full mt-3 w-64 rounded-2xl p-4 transition-all duration-200 opacity-0 scale-95 translate-y-[-10px] invisible shadow-3xl overflow-hidden z-[5001]">
                    <div class="flex flex-col gap-4">
                        <!-- Severe Weather Section -->
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Severe Weather</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="toggle-alerts" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        
                        <!-- Radar Section -->
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Live Radar</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="toggle-radar-layer" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div id="radar-product-selector" class="flex p-1 bg-white/5 rounded-xl gap-1">
                                <button data-product="sr_bref" class="radar-product-btn active flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all uppercase tracking-tight outline-none">Reflectivity</button>
                                <button data-product="sr_vel" class="radar-product-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all uppercase tracking-tight outline-none">Velocity</button>
                            </div>
                        </div>

                        <hr class="border-white/10">

                        <!-- Outlooks Section -->
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">SPC Outlooks</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="toggle-outlooks" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div id="layer-options" class="flex flex-col gap-1 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                                <!-- Populated via JS -->
                            </div>
                        </div>

                        <hr class="border-white/10">

                        <div class="p-1">
                            <button id="toggle-radar-sites" class="w-full text-left px-3 py-2 rounded-xl text-xs sm:text-sm transition-colors hover:bg-white/5 cursor-pointer flex items-center justify-between group outline-none">
                                <span class="text-slate-400 group-hover:text-white font-medium">Radar Site Labels</span>
                                <div id="radar-sites-status" class="w-1.5 h-1.5 rounded-full bg-slate-500 transition-colors"></div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 relative">
        <div id="map" class="w-full h-full"></div>
        
        <!-- Legend Toggle Button (Mobile) -->
        <button id="legend-toggle" class="sm:hidden absolute bottom-6 left-6 w-12 h-12 glass-panel rounded-full flex items-center justify-center z-[1001] text-blue-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>

        <!-- Legend Overlay -->
        <div id="legend-container" class="glass-panel absolute bottom-20 left-6 right-6 sm:right-auto sm:bottom-8 sm:left-6 p-5 rounded-2xl z-[1000] sm:w-64 transition-all duration-300 transform translate-y-4 opacity-0 scale-95 sm:translate-y-0 sm:opacity-100 sm:scale-100">
            <div class="flex justify-between items-center mb-4 sm:mb-3">
                <h3 class="text-[10px] sm:text-xs font-semibold text-slate-400 uppercase tracking-widest">Outlook Categories</h3>
                <button id="legend-close" class="sm:hidden text-slate-400">&times;</button>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-1 gap-3 sm:gap-2">
                <div class="flex items-center text-[11px] sm:text-sm"><span class="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded-sm mr-2.5 border border-white/20 bg-spc-tstm"></span> TSTM</div>
                <div class="flex items-center text-[11px] sm:text-sm"><span class="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded-sm mr-2.5 border border-white/20 bg-spc-mrgl"></span> MRGL</div>
                <div class="flex items-center text-[11px] sm:text-sm"><span class="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded-sm mr-2.5 border border-white/20 bg-spc-slgt"></span> SLGT</div>
                <div class="flex items-center text-[11px] sm:text-sm"><span class="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded-sm mr-2.5 border border-white/20 bg-spc-enh"></span> ENH</div>
                <div class="flex items-center text-[11px] sm:text-sm"><span class="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded-sm mr-2.5 border border-white/20 bg-spc-mdt"></span> MDT</div>
                <div class="flex items-center text-[11px] sm:text-sm"><span class="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded-sm mr-2.5 border border-white/20 bg-spc-high"></span> HIGH</div>
            </div>
        </div>

        <!-- Discussion Side Panel -->
        <div id="side-panel" class="glass-panel absolute transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-5 border-b border-white/10 bg-white/3">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Technical Discussion</h3>
                <button id="close-panel" class="text-slate-400 hover:text-white text-2xl leading-none transition-colors">&times;</button>
            </div>
            <div id="discussion-body" class="flex-1 overflow-y-auto p-6 text-sm leading-relaxed scrollbar-thin scrollbar-thumb-white/10">
                <p class="text-slate-400 italic text-center mt-8">Select a region to view the technical discussion...</p>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
